<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>설문지</title>
    </head>
    <body> 
        <form>
            <fieldset>
                <article>
                    <header>
                        <h3>설문지</h3><br>
                        소프트웨어 기술에 대한 의견을 듣습니다.많은참여 부탁드립니다
                    </header>
                    <hr>
                    <form>
                        학년 <input type="radio" name="grade" value="1">1학년
                        <input type="radio" name="grade" value="2">2학년
                        <input type="radio" name="grade" value="3">3학년<br>
                        성별 <input type="radio" name="gender" value="1"> 남자
                        <input type="radio" name="gender" value="2"> 여자<br>
                        관심분야<select name="interest">
                            <option value="1">게임 개발</option>
                            <option value="2">웹 개발</option>
                            <option value="3">앱 개발</option>
                            <option value="4">인공지능</option>
                        </select><br>
                        진로<input type="checkbox" name="career" value="1">개발
                        <input type="checkbox" name="career" value="2">기획
                        <input type="checkbox" name="career" value="3">영업
                        <input type="checkbox" name="career" value="4">창업<br>
                        <textarea name="opinion" rows="5" cols="30" placeholder="의견을 입력해주세요"></textarea><br>
                        남기고 싶은말
                    </form>
                </article>
            </fieldset>
        </form>

    </body>
</html>
