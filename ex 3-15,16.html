<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>시간정보입력폼</title>
    </head>
    <body>
        <h3>시간정보 입력폼</h3>
        <hr>
        2022년 12월 31일 23시 30분
        시간을 생일로 변경해보세요
        <hr>
        <form>
            <table>
                <tr><td>생일</td>
                    <td><input type="date" value="2022-12-31"></td>
                </tr>
                <tr><td>생일파티시간</td>
                    <td><input type="time" value="2022-12-31T23:30"></td>
                </tr>
                <tr>
                    <td>생일파티장소</td>
                    <td><input type="text" value="서울"></td>
                </tr>
            </table>
        </form>
    </body>
</html>
