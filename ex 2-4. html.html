<html>

        <title>단락나누기</title>

    <body>
    <h3>2개의 단락 나누기</h3>
    <p>
        HTML 문서도 본문을 여러단락으로 나눌 수 있다.
        CSS스타일을 사용하면 단락단위로 내어쓰기와 들여쓰기가 가능하다.
    </p>
    <p>
        여러개의 빈칸은 하나로 취급되며, 
        엔터키 역시 하나의 빈 칸으로 처리된다
    </p>
