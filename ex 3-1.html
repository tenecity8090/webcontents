<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>HTML문서 구조 시맨틱 태그 사용</title>
        <style>
            html,body{margin: 0%;padding: 0%;height: 100%;}
            header{width: 100%;height: 20%;background: lightblue;}
            nav{width:15%;height: 70%;background: lightgray;float: left;}
            section{width: 70%;height: 70%;background: lightyellow;float: left;}
            aside{width: 15%;height: 70%;background: lightgray;float: left;}
            footer{width: 100%;height: 15%;background: lightpink;clear: both;}
        </style>

    </head>
    <body>
        <header>header</header>
        <nav>nav</nav>
        <section>section</section>
        <aside>aside</aside>
        <footer>footer</footer>
    </body>
</html>
