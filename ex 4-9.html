<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>셀렉터 만들기</title>
        <style>
            h3,li{/*태그 이름 셀렉터*/
                color:blue;
            }
            div>div>strong{/*자식 셀렉터*/
                background:green;
            }
            ul strong{/*자손 셀렉터*/
                color:yellow;
            }
            .warning{/*class 셀렉터*/
                color:red;
            }
            body.main{/*class 셀렉터*/
                background:gray;
            }
            #list{/*id 셀렉터*/
                background:orange;
            }
            #list span{/*자손 셀렉터*/
                color:purple;
            }
            h3::first-letter{/*가상 클래스 셀렉터*/
                color: aliceblue;
            }
            li:hover {/*가상 클래스 셀렉터*/
                background: lightgray;
            }
        </style>
    </head>
    <body class="main">
        <h3>web programming</h3>
        <hr>
        <div>
            <div>2학기
                <strong>학습내용</strong>입니다
            </div>
            <ul id="list">
                <li><span>HTML5</span></li>
                <li><strong>CSS</strong></li>
                <li>javascript</li>
            </ul>
            <div class="warning">60점 이하는 F</div>

        </div>
    </body>

</html>
